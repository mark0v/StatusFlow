services:
  api:
    build:
      context: ./apps/api
    ports:
      - "8000:8000"
    environment:
      PYTHONUNBUFFERED: "1"
      DATABASE_URL: postgresql+psycopg://statusflow:statusflow@postgres:5432/statusflow
    depends_on:
      - postgres

  web:
    build:
      context: ./apps/web
    ports:
      - "3000:3000"
    depends_on:
      - api

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: statusflow
      POSTGRES_USER: statusflow
      POSTGRES_PASSWORD: statusflow
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
